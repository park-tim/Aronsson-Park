<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krönika – Aronsson & Park</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #e84c30;
      --bg: #0e0e0e;
      --bg3: #161616;
      --text: #f0ede6;
      --muted: rgba(240, 237, 230, 0.55);
      --dimmed: rgba(240, 237, 230, 0.25);
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14, 14, 14, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--red);
    }

    .nav-back {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .nav-back:hover {
      color: var(--red);
    }

    /* HERO BILD */
    .kronika-hero {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      display: block;
    }

    .kronika-hero-placeholder {
      width: 100%;
      height: 6px;
      background: var(--red);
    }

    /* ARTIKEL */
    .kronika-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 96px;
    }

    .kronika-meta {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 16px;
    }

    .kronika-rubrik {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 7vw, 64px);
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 20px;
    }

    .kronika-intro {
      font-size: 18px;
      color: var(--muted);
      line-height: 1.7;
      border-left: 3px solid var(--red);
      padding-left: 20px;
      margin-bottom: 48px;
    }

    .kronika-divider {
      width: 48px;
      height: 3px;
      background: var(--red);
      margin-bottom: 40px;
    }

    /* Innehåll-styling */
    .kronika-innehall p {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 24px;
    }

    .kronika-innehall h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.03em;
      color: var(--text);
      margin: 40px 0 16px;
    }

    .kronika-innehall img {
      width: 100%;
      border-radius: 4px;
      margin: 32px 0;
      border: 1px solid var(--border);
      display: block;
    }

    /* TILLBAKA-knapp */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--dimmed);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--red);
    }

    .not-found {
      text-align: center;
      padding: 120px 24px;
      color: var(--muted);
    }

    .not-found h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--text);
      margin-bottom: 16px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-logo">Aronsson <span>&</span> Park</a>
    <a href="index.html#kronikor" class="nav-back">← Tillbaka till krönikor</a>
  </nav>

  <div id="kronika-container"></div>

  <script src="kronikor.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const container = document.getElementById('kronika-container');

    const kronika = kronikor.find(k => k.id === id);

    if (!kronika) {
      container.innerHTML = `
        <div class="not-found">
          <h2>Hittades inte</h2>
          <p>Den här krönikan verkar inte finnas.</p>
          <a href="index.html#kronikor" class="back-btn">← Tillbaka</a>
        </div>
      `;
    } else {
      document.title = kronika.rubrik + ' – Aronsson & Park';

      container.innerHTML = `
        ${kronika.bild
          ? `<img src="${kronika.bild}" alt="${kronika.rubrik}" class="kronika-hero" onerror="this.outerHTML='<div class=kronika-hero-placeholder></div>'">`
          : '<div class="kronika-hero-placeholder"></div>'
        }
        <div class="kronika-wrap">
          <div class="kronika-meta">${kronika.datum} &nbsp;·&nbsp; ${kronika.forfatter}</div>
          <h1 class="kronika-rubrik">${kronika.rubrik}</h1>
          <p class="kronika-intro">${kronika.intro}</p>
          <div class="kronika-divider"></div>
          <div class="kronika-innehall">${kronika.innehall}</div>
          <a href="index.html#kronikor" class="back-btn">← Tillbaka till krönikor</a>
        </div>
      `;
    }
  </script>

</body>

</html>
